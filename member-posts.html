<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Members Area - TSA Website</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/themes/light.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.20.1/cdn/shoelace-autoloader.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" />
  </head>
  <body>
    <h1>Members Area - TSA Website</h1>
     <nav class="navbar">
        <ul>
            <li> <a href="index.html">Home</a> </li>    
            <li><a id="first-nav" href="about.html">About</a></li>
            <li><a id="second-nav" href="member-posts.html">Members Area</a></li>
            <li><a id="last-nav" href="involvement.html">Get Involved</a></li>
        </ul>
    </nav>
    <div id="posts-header-row">
      <h2 class="google-sans-mainclass" id="posts">Posts</h2>
      <div id="posts-search-row">
        <span id="search-btn" class="material-symbols-outlined">search</span>
        <label id="search"><input type="text" id="search-input"></label> 
      </div>
    </div>
    <div id="posts-filter-row">
      <button id="clear-btn" class="google-sans-subclass" type="button" onclick="really_clear()">Clear</button>
      <button id="filter-btn" class="google-sans-subclass" type="button" onclick="changePage('announcement', 'filter_query')">Announcements</button>
      <button id="filter-btn" class="google-sans-subclass" type="button" onclick="changePage('general info', 'filter_query')">General Info</button>
      <button id="filter-btn" class="google-sans-subclass" type="button" onclick="changePage('events', 'filter_query')">Events</button>
    </div>
    <sl-divider></sl-divider>
    <div id="myModal" class="modal">
      <div class="modal-content">
        <span class="close" id="close">&times;</span>
        <h2 id="modal-post-title" class="google-sans-mainclass">Some headers in the Modal...</h2>
        <p id="modal-post-content" class="google-sans-subclass">Some text in the Modal..</p>
      </div>
    </div>
    <div id="posts-container">
    </div>
    <sl-divider></sl-divider>
    <div id="pagination-row">
      <button type="button" id="page-prev" onclick="prevPage()">Prev</button>
      <span id="page-info" class="google-sans-subclass">Page 1 / 1</span>
      <button type="button" id="page-next" onclick="nextPage()">Next</button>
    </div>
    <script type="module" src="data-handling.js"></script>
  </body>
</html>
